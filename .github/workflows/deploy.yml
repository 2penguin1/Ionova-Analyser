name: Deploy IoNova Eval Analyzer (Manual)

on:
  workflow_dispatch: # This changes the trigger from automatic to 100% manual!

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          # 1. Navigate to the repository root
          cd /home/sujal/apps/Ionova-Analyser
          
          # 2. Reset local changes and pull the latest code
          sudo git reset --hard origin/main
          sudo git pull origin main
          
          # 3. Build the Frontend as the 'sujal' user
          sudo -u sujal -i bash -c "
            cd /home/sujal/apps/Ionova-Analyser/frontend
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\"
            npm install
            npm run build
          "
          
          # 4. Restart Nginx to clean cache
          sudo systemctl reload nginx
          
          # 5. Restart the Python FastAPI Backend Process
          # If you use Systemd (recommended), uncomment the line below:
          # sudo systemctl restart ionova-backend
          
          # If you use PM2 to manage your Python app, uncomment the line below:
          sudo -u sujal -i bash -c "pm2 restart ionova-backend"