name: Deploy IoNova Eval Analyzer (Manual)

on:
  workflow_dispatch: # Manual trigger via GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          # 1. Resolve the Git security blocker globally for the ubuntu user
          git config --global --add safe.directory /home/sujal/apps/Ionova-Analyser
          
          # 2. Navigate to the repository root
          cd /home/sujal/apps/Ionova-Analyser
          
          # 3. Pull down clean changes from main branch
          sudo git reset --hard origin/main
          sudo git pull origin main
          
          # 4. Build the Frontend using a clean environment wrapper
          sudo -u sujal -i bash -c '
            cd /home/sujal/apps/Ionova-Analyser/frontend
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            npm install
            npm run build
          '
          
          # 5. Reload your Nginx proxy router configuration
          sudo systemctl reload nginx
          
          # 6. Safely restart your FastAPI backend process manager using sujal profile paths
          sudo -u sujal -i bash -c '
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            pm2 restart ionova-backend
          '