name: Deploy IoNova Eval Analyzer (Manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          # 1. Bypass Git directory ownership blocks
          sudo -u sujal -i git config --global --add safe.directory /home/sujal/apps/Ionova-Analyser
          
          # 2. Pull latest code securely as sujal
          sudo -u sujal -i bash << 'EOF'
            cd /home/sujal/apps/Ionova-Analyser
            git reset --hard origin/main
            git pull origin main
          EOF
          
          # 3. Build the Frontend assets cleanly
          sudo -u sujal -i bash << 'EOF'
            cd /home/sujal/apps/Ionova-Analyser/frontend
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            npm install
            npm run build
          EOF
          
          # 4. Reload your Nginx proxy router
          sudo systemctl reload nginx
          
          # 5. Restart the FastAPI Backend securely without PM2
          sudo -u sujal -i bash << 'EOF'
            cd /home/sujal/apps/Ionova-Analyser/backend
            
            # Find and kill the old Python process running on port 8000
            fuser -k 8000/tcp || true
            
            # Activate virtual environment if it exists
            if [ -d "venv" ]; then
              source venv/bin/activate
            fi
            
            # Start the new backend in the background and log output to backend.log
            nohup python3 -m uvicorn main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
          EOF