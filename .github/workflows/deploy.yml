name: Deploy IoNova Eval Analyzer (Manual)

on:
  workflow_dispatch: # Manual trigger via GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          # 1. Run the Git commands directly as the folder owner 'sujal' to completely bypass dubious ownership flags
          sudo -u sujal -i git config --global --add safe.directory /home/sujal/apps/Ionova-Analyser
          sudo -u sujal -i bash -c "cd /home/sujal/apps/Ionova-Analyser && git reset --hard origin/main && git pull origin main"
          
          # 2. Build the Frontend assets cleanly as the 'sujal' user
          sudo -u sujal -i bash -c "
            cd /home/sujal/apps/Ionova-Analyser/frontend
            export NVM_DIR=\$HOME/.nvm
            [ -s \$NVM_DIR/nvm.sh ] && . \$NVM_DIR/nvm.sh
            npm install
            npm run build
          "
          
          # 3. Reload your Nginx proxy server configuration (runs as root/ubuntu)
          sudo systemctl reload nginx
          
          # 4. Restart your FastAPI backend via PM2 using sujal's profile paths
          sudo -u sujal -i bash -c "
            export NVM_DIR=\$HOME/.nvm
            [ -s \$NVM_DIR/nvm.sh ] && . \$NVM_DIR/nvm.sh
            pm2 restart ionova-backend
          "