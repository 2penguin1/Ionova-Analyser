name: Deploy IoNova Eval Analyzer

on:
  push:
    branches:
      - main  # Triggers the deployment whenever you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          # 1. Navigate to the repository root
          cd /home/sujal/apps/Ionova-Analyser
          
          # 2. Reset any local changes and pull the latest code from GitHub
          sudo git reset --hard origin/main
          sudo git pull origin main
          
          # 3. Build the Frontend as the 'sujal' user to preserve node/npm environment settings
          sudo -u sujal -i bash -c "
            cd /home/sujal/apps/Ionova-Analyser/frontend
            
            # Load NVM (Node Version Manager) environment paths
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\"
            
            # Install packages and build production assets
            npm install
            npm run build
          "
          
          # 4. Restart Nginx to clean the caching state
          sudo systemctl reload nginx