name: Deploy IoNova Eval Analyzer

on:
  push:
    branches:
      - main  # Triggers the deployment whenever you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          # 1. Navigate to the repository root
          cd /home/sujal/apps/Ionova-Analyser
          
          # 2. Pull the latest changes from GitHub
          git pull origin main
          
          # 3. Build the Frontend
          cd frontend
          # Load your user environment paths so 'npm' and 'node' are recognized
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          
          npm install
          npm run build
          
          # 4. Restart Nginx to ensure clean state
          sudo systemctl reload nginx
          
          # 5. Optional: Restart Backend if you changed Python code
          # cd ../backend
          # (Add any backend update or restart commands here if needed)