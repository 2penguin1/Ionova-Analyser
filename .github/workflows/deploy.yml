name: Deploy IoNova Eval Analyzer (Manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          # 1. Bypass Git directory ownership blocks
          sudo -u sujal -i git config --global --add safe.directory /home/sujal/apps/Ionova-Analyser
          
          # 2. Pull latest code securely as sujal
          sudo -u sujal -i bash << 'EOF'
            cd /home/sujal/apps/Ionova-Analyser
            git reset --hard origin/main
            git pull origin main
          EOF
          
          # 3. Build the Frontend assets cleanly using a Heredoc block
          sudo -u sujal -i bash << 'EOF'
            cd /home/sujal/apps/Ionova-Analyser/frontend
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            npm install
            npm run build
          EOF
          
          # 4. Reload your Nginx proxy router configuration
          sudo systemctl reload nginx
          
          # 5. Restart your FastAPI backend via PM2
          sudo -u sujal -i bash << 'EOF'
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            pm2 restart ionova-backend
          EOF