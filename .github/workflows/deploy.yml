name: Deploy IoNova Eval Analyzer (Manual)

on:
  workflow_dispatch: # Manual deployment trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          # 1. Tell Git to trust this directory layout explicitly
          sudo git config --global --add safe.directory /home/sujal/apps/Ionova-Analyser
          
          # 2. Navigate to the repository root
          cd /home/sujal/apps/Ionova-Analyser
          
          # 3. Reset local changes and pull latest changes safely
          sudo git reset --hard origin/main
          sudo git pull origin main
          
          # 4. Build the Frontend as the 'sujal' user
          sudo -u sujal -i bash -c "
            cd /home/sujal/apps/Ionova-Analyser/frontend
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\"
            npm install
            npm run build
          "
          
          # 5. Restart Nginx to flush routing caches
          sudo systemctl reload nginx
          
          # 6. Restart the Python FastAPI Backend Process via PM2 as user 'sujal'
          sudo -u sujal -i bash -c "
            export PATH=\$PATH:\$HOME/.config/nvm/versions/node/\$(node -v)/bin:\$HOME/.npm-global/bin
            pm2 restart ionova-backend
          "