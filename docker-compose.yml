services:
  db:
    image: postgres:16
    container_name: ionova-analyzer-db
    environment:
      POSTGRES_USER: analyzer
      POSTGRES_PASSWORD: analyzer
      POSTGRES_DB: analyzer
    ports:
      - "5433:5432"
    volumes:
      - analyzer_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyzer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  analyzer_pgdata:
